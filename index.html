<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Probetgames</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .hidden { display: none !important; }
        .multiplier-text { font-size: 5rem; font-weight: 900; transition: all 0.1s; color: white; }
        .multiplier-crash { color: #dc3545 !important; }
        .btn-apostar { background-color: #28a745; color: white; }
        .btn-espera { background-color: #1a5e2b; color: #ccc; cursor: not-allowed; }
        .btn-sacar { background-color: #d9a406; color: black; font-weight: 900; }
        .btn-ganhou { background-color: #007bff; color: white; }
        .btn-perdeu { background-color: #dc3545; color: white; }
        .history-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px; scrollbar-width: none; min-height: 45px; }
        .history-item { padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; flex-shrink: 0; }
        .progress-container { width: 100%; background: #222; height: 4px; border-radius: 2px; margin-top: 10px; }
        #progress-bar { width: 0%; height: 100%; background: #d9a406; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div id="auth-screen" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-6">
    <h1 class="text-red-600 text-3xl font-black mb-8 select-none tracking-tighter">AVIADOR PROBETGAMES</h1>
    <div class="w-full max-w-sm bg-gray-900 p-6 rounded-3xl border border-gray-800">
        <input type="text" id="phone" placeholder="Contacto (+258...)" class="w-full p-4 mb-3 bg-black border border-gray-700 rounded-xl text-white outline-none focus:border-red-600 transition-all">
        <input type="password" id="pin" placeholder="PIN de 6 dígitos" class="w-full p-4 mb-6 bg-black border border-gray-700 rounded-xl text-white outline-none focus:border-red-600 transition-all">
        <button onclick="userAction.login()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-xl font-bold mb-3 transition-colors">ENTRAR</button>
        <button onclick="userAction.register()" class="w-full bg-gray-800 hover:bg-gray-700 py-4 rounded-xl font-bold transition-colors">CRIAR CONTA</button>
    </div>
</div>

<div id="game-screen" class="p-4 hidden">
    <div class="flex justify-between items-start mb-4">
        <div>
            <p id="player-id" class="text-gray-500 text-xs uppercase font-bold tracking-widest">---</p>
            <p class="text-green-500 text-[10px] font-bold">● <span id="online-count">1248</span> ONLINE</p>
        </div>
        <div class="text-right">
            <div class="text-yellow-500 font-black text-2xl leading-tight"><span id="saldo-real">0.00</span> <span class="text-xs">MTN</span></div>
            <div class="flex gap-2 justify-end mt-2">
                <button onclick="uiAction.deposit()" class="bg-green-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">DEPOSITAR</button>
                <button onclick="uiAction.withdraw()" class="bg-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">LEVANTAR</button>
            </div>
        </div>
    </div>

    <div id="history" class="history-bar mb-2 bg-black/50 rounded-xl border border-gray-900"></div>

    <div class="bg-black aspect-video rounded-[2rem] flex flex-col items-center justify-center border-2 border-gray-800 relative mb-4 overflow-hidden">
        <div id="mult-display" class="multiplier-text">1.00x</div>
        <div id="game-info" class="text-gray-500 font-bold uppercase tracking-widest text-[10px] mt-2">Aguardando...</div>
        <div class="w-48 progress-container hidden" id="waiting-timer">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-gray-900 p-4 rounded-3xl border border-gray-800">
            <input type="number" id="bet-val-1" value="10" class="w-full bg-black text-center p-2 rounded-lg mb-2 text-white font-bold border border-gray-700">
            <button id="btn-bet-1" onclick="gameEngine.placeBet(1)" class="w-full py-5 rounded-2xl btn-apostar font-black text-lg uppercase transition-all shadow-lg">Apostar</button>
            <div id="cashout-val-1" class="text-center text-[10px] mt-2 text-gray-500 font-bold">GANHOS: 0.00</div>
        </div>
        <div class="bg-gray-900 p-4 rounded-3xl border border-gray-800">
            <input type="number" id="bet-val-2" value="10" class="w-full bg-black text-center p-2 rounded-lg mb-2 text-white font-bold border border-gray-700">
            <button id="btn-bet-2" onclick="gameEngine.placeBet(2)" class="w-full py-5 rounded-2xl btn-apostar font-black text-lg uppercase transition-all shadow-lg">Apostar</button>
            <div id="cashout-val-2" class="text-center text-[10px] mt-2 text-gray-500 font-bold">GANHOS: 0.00</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBtEE6FKPFH9Bv2DhZNlb865iVsaX_2kpw",
        authDomain: "casa-de-jogos-ed385.firebaseapp.com",
        databaseURL: "https://casa-de-jogos-ed385-default-rtdb.firebaseio.com",
        projectId: "casa-de-jogos-ed385",
        storageBucket: "casa-de-jogos-ed385.firebasestorage.app",
        messagingSenderId: "400751100510",
        appId: "1:400751100510:web:e195695191607d02e46acf"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let userData = null;
    let isFlying = false;
    let currentMult = 1.0;
    let cofreDisponivel = 0;
    let flightInterval = null;

    let bets = {
        1: { active: false, amount: 0, waiting: false },
        2: { active: false, amount: 0, waiting: false }
    };

    // --- FUNÇÃO DE JOGADORES ONLINE DINÂMICOS ---
    function updateOnlineCount() {
        const base = 1200;
        const variation = Math.floor(Math.random() * 150);
        document.getElementById('online-count').innerText = base + variation;
    }
    setInterval(updateOnlineCount, 3000);
    updateOnlineCount();

    onValue(ref(db, 'Config/Cofre'), (snap) => {
        cofreDisponivel = snap.val() || 5000;
    });

    window.userAction = {
        login: async () => {
            const phone = document.getElementById('phone').value;
            const pin = document.getElementById('pin').value;
            const snap = await get(ref(db, 'User/' + phone));
            if(snap.exists() && snap.val().PIN === pin) {
                userData = snap.val();
                window.uiAction.initGame();
            } else { alert("Dados de acesso incorretos!"); }
        },
        register: async () => {
            const phone = document.getElementById('phone').value;
            const pin = document.getElementById('pin').value;
            if(!phone || pin.length < 4) return alert("Preencha todos os campos corretamente.");
            
            // BÓNUS DE 5 MTN
            await set(ref(db, 'User/' + phone), { Contacto: phone, PIN: pin, Saldo: 5, Bonus: 0 });
            alert("Conta criada! Recebeu 5 MTN de bónus.");
        }
    };

    window.uiAction = {
        initGame: () => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('player-id').innerText = userData.Contacto;
            
            onValue(ref(db, `User/${userData.Contacto}/Saldo`), s => {
                const val = s.val() || 0;
                document.getElementById('saldo-real').innerText = val.toFixed(2);
                userData.Saldo = val;
            });
            window.gameEngine.waitNextRound();
        },
        deposit: () => {
            const msg = "DEPÓSITO\n\nEnvie o valor para: 860407269\nEnvie comprovativo via WhatsApp.";
            if(confirm(msg)) {
                window.open(`https://wa.me/258860407269?text=Depósito: ${userData.Contacto}`, '_blank');
            }
        },
        withdraw: async () => {
            const valorStr = prompt("Valor a levantar (Mínimo 100 MTN):");
            const valor = parseFloat(valorStr);
            if (valor >= 100 && valor <= userData.Saldo) {
                const novoSaldo = userData.Saldo - valor;
                await update(ref(db, `User/${userData.Contacto}`), { Saldo: novoSaldo });
                await push(ref(db, 'Levantamentos'), {
                    contacto: userData.Contacto,
                    valor: valor,
                    data: new Date().toLocaleString(),
                    status: "Pendente"
                });
                alert("Pedido enviado para análise!");
            } else { alert("Saldo insuficiente."); }
        },
        updateHistory: (odd) => {
            const container = document.getElementById('history');
            let color = odd < 2 ? "bg-red-600" : (odd < 10 ? "bg-blue-600" : "bg-purple-600");
            const item = `<span class="history-item ${color}">${odd.toFixed(2)}x</span>`;
            container.innerHTML = item + container.innerHTML;
        }
    };

    window.gameEngine = {
        waitNextRound: () => {
            isFlying = false;
            let timer = 5;
            document.getElementById('game-info').innerText = `PRÓXIMA RODADA EM ${timer}s`;
            document.getElementById('waiting-timer').classList.remove('hidden');
            
            const countdown = setInterval(() => {
                timer--;
                document.getElementById('game-info').innerText = `PRÓXIMA RODADA EM ${timer}s`;
                document.getElementById('progress-bar').style.width = ((5-timer)/5 * 100) + "%";
                if(timer <= 0) {
                    clearInterval(countdown);
                    document.getElementById('waiting-timer').classList.add('hidden');
                    window.gameEngine.launch();
                }
            }, 1000);
        },
        launch: () => {
            isFlying = true;
            currentMult = 1.0;
            let crashPoint = window.gameEngine.calcOdds();
            
            document.getElementById('mult-display').classList.remove('multiplier-crash');
            document.getElementById('game-info').innerText = "VÔO EM CURSO";

            [1, 2].forEach(id => {
                if(bets[id].waiting) {
                    bets[id].active = true;
                    bets[id].waiting = false;
                    document.getElementById(`btn-bet-${id}`).innerText = "SACAR";
                    document.getElementById(`btn-bet-${id}`).className = "w-full py-5 rounded-2xl btn-sacar font-black text-lg uppercase";
                }
            });

            flightInterval = setInterval(() => {
                currentMult += 0.01 + (currentMult * 0.006); 
                document.getElementById('mult-display').innerText = currentMult.toFixed(2) + "x";

                let riscoTotal = 0;
                [1, 2].forEach(id => {
                    if(bets[id].active) riscoTotal += (bets[id].amount * currentMult);
                });

                // PROTEÇÃO RADICAL DA CASA
                if(riscoTotal > cofreDisponivel || currentMult >= crashPoint) {
                    window.gameEngine.crash(currentMult);
                }

                [1, 2].forEach(id => {
                    if(bets[id].active) {
                        document.getElementById(`cashout-val-${id}`).innerText = "GANHOS: " + (bets[id].amount * currentMult).toFixed(2);
                    }
                });
            }, 100);
        },
        crash: (point) => {
            clearInterval(flightInterval);
            isFlying = false;
            document.getElementById('mult-display').classList.add('multiplier-crash');
            document.getElementById('game-info').innerText = "EXPLODIU!";
            window.uiAction.updateHistory(point);

            [1, 2].forEach(id => {
                if(bets[id].active) {
                    document.getElementById(`btn-bet-${id}`).innerText = "PERDEU";
                    document.getElementById(`btn-bet-${id}`).className = "w-full py-5 rounded-2xl btn-perdeu font-black text-lg uppercase";
                    bets[id].active = false;
                }
                setTimeout(() => {
                    if(!bets[id].waiting) {
                        document.getElementById(`btn-bet-${id}`).innerText = "Apostar";
                        document.getElementById(`btn-bet-${id}`).className = "w-full py-5 rounded-2xl btn-apostar font-black text-lg uppercase";
                        document.getElementById(`cashout-val-${id}`).innerText = "GANHOS: 0.00";
                    }
                }, 2000);
            });
            setTimeout(() => { window.gameEngine.waitNextRound(); }, 3000);
        },
        placeBet: async (id) => {
            const btn = document.getElementById(`btn-bet-${id}`);
            const amount = parseFloat(document.getElementById(`bet-val-${id}`).value);

            if(!isFlying && !bets[id].waiting) {
                if(amount > userData.Saldo) return alert("Saldo insuficiente!");
                const novoSaldo = userData.Saldo - amount;
                await update(ref(db, `User/${userData.Contacto}`), { Saldo: novoSaldo });
                await update(ref(db, 'Config'), { Cofre: cofreDisponivel + amount });
                
                bets[id].waiting = true;
                bets[id].amount = amount;
                btn.innerText = "CANCELAR";
                btn.className = "w-full py-5 rounded-2xl btn-espera font-black text-lg uppercase";

            } else if(isFlying && bets[id].active) {
                let ganho = bets[id].amount * currentMult;
                bets[id].active = false;
                const novoSaldo = userData.Saldo + ganho;
                await update(ref(db, `User/${userData.Contacto}`), { Saldo: novoSaldo });
                await update(ref(db, 'Config'), { Cofre: cofreDisponivel - ganho });
                
                btn.innerText = "GANHOU!";
                btn.className = "w-full py-5 rounded-2xl btn-ganhou font-black text-lg uppercase";
            }
        },
        calcOdds: () => {
            const r = Math.random() * 100;
            // PROBABILIDADES RIGOROSAS
            if(r < 45) return 1.00;             // 45% Instant Crash
            if(r < 92) return (Math.random() * 0.5 + 1.1); // 47% de Crash muito baixo (1.1x a 1.6x)
            return (Math.random() * 2 + 1.8);    // Apenas 8% de chance de chegar perto de 3x
        }
    };
</script>
</body>
</html>
